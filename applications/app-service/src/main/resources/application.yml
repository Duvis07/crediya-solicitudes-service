server:
  port: 8081

spring:
  application:
    name: "solicitudes-service"
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  devtools:
    add-properties: false
  aop:
    auto: true
    proxy-target-class: true
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}
    from: crediya@localhost
#  security:
#    oauth2:
#      resourceserver:
#        jwt:
#          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:8080/.well-known/jwks.json}
#          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8080}

# Database configuration
  r2dbc:
    url: r2dbc:postgresql://${R2DBC_HOST}:${R2DBC_PORT}/${R2DBC_DATABASE}
    username: ${R2DBC_USERNAME}
    password: ${R2DBC_PASSWORD}
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m
      validation-query: SELECT 1
  
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: false
  

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}

#logging:
#  level:
#    co.com.crediya.solicitudes: DEBUG
#    org.springframework.r2dbc: DEBUG
#    org.springframework.security: DEBUG
#  pattern:
#    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

cors:
  allowed-origins: "http://localhost:4200,http://localhost:8081"

# Authentication service configuration
auth-service:
  base-url: ${AUTH_SERVICE_BASE_URL}
  endpoints:
    api-base: ${AUTH_SERVICE_ENDPOINTS_API_BASE}
    user-by-document: ${AUTH_SERVICE_ENDPOINTS_USER_BY_DOCUMENT}

# Resilience4j configuration
resilience4j:
  circuitbreaker:
    instances:
      auth-service:
        sliding-window-size: 20
        failure-rate-threshold: 80
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  retry:
    instances:
      auth-service:
        max-attempts: 3
        wait-duration: 8s
        exponential-backoff-multiplier: 1
        retry-exceptions:
          - org.springframework.web.reactive.function.client.WebClientRequestException
          - java.net.ConnectException
  timelimiter:
    instances:
      auth-service:
        timeout-duration: 30s

# MailHog Configuration for local email testing

# AWS LocalStack Configuration
aws:
  localstack:
    endpoint: ${AWS_ENDPOINT_URL:http://localhost:4566}
  region: ${AWS_REGION:us-east-1}
  access-key: ${AWS_ACCESS_KEY_ID:test}
  secret-key: ${AWS_SECRET_ACCESS_KEY:test}
  sqs:
    endpoint: ${AWS_SQS_ENDPOINT:http://localhost:4566}
    queues:
      solicitudes-capacidad: ${AWS_SQS_QUEUES_SOLICITUDES_CAPACIDAD:http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/solicitudes-capacidad-queue}
      resultados-evaluacion: ${AWS_SQS_QUEUES_RESULTADOS_EVALUACION:http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/resultados-evaluacion-queue}
      manual-decision: ${AWS_SQS_QUEUES_MANUAL_DECISION:http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/manual-decision-queue}
      loan-approved-events: ${AWS_SQS_QUEUES_LOAN_APPROVED_EVENTS:http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/loan-approved-events-queue}


