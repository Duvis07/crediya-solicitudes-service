version: '3.8'

services:
  # PostgreSQL Database for Solicitudes
  postgres-solicitudes:
    image: postgres:15-alpine
    container_name: crediya-postgres-solicitudes
    environment:
      POSTGRES_DB: crediya_solicitudes_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nueva_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5434:5432"
    volumes:
      - postgres_solicitudes_data:/var/lib/postgresql/data
    networks:
      - crediya-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crediya_solicitudes_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Solicitudes Service
  solicitudes-service:
    build:
      context: ./deployment
      dockerfile: Dockerfile
    container_name: crediya-solicitudes-service
    environment:
      # Database Configuration
      DB_HOST: postgres-solicitudes
      DB_PORT: 5432
      DB_NAME: crediya_solicitudes_db
      DB_USER: postgres
      DB_PASSWORD: nueva_password
      
      # R2DBC Configuration
      R2DBC_HOST: postgres-solicitudes
      R2DBC_PORT: 5432
      R2DBC_DATABASE: crediya_solicitudes_db
      R2DBC_SCHEMA: public
      R2DBC_USERNAME: postgres
      R2DBC_PASSWORD: nueva_password
      
      # Server Configuration
      SERVER_PORT: 8081
      
      # Authentication Service Configuration
      AUTH_SERVICE_BASE_URL: http://authentication-service:8080
      AUTH_SERVICE_ENDPOINTS_API_BASE: /api/v1/usuarios
      AUTH_SERVICE_ENDPOINTS_USER_BY_DOCUMENT: /{documentId}

      # JWT Configuration
      JWT_SECRET: mySecretKeyForCrediyaAuthenticationServiceThatIsLongEnoughForHS256
      JWT_JWK_SET_URI: http://authentication-service:8080/.well-known/jwks.json
      JWT_ISSUER_URI: http://authentication-service:8080
      
      # CORS Configuration
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://authentication-service:8080,http://solicitudes-service:8081
      
      # Logging
      LOGGING_LEVEL_ROOT: WARN
      LOGGING_LEVEL_CO_COM_CREDIYA: INFO
      
      # Spring Profiles
      SPRING_PROFILES_ACTIVE: docker
      
      # AWS/LocalStack Configuration
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://host.containers.internal:4566
      AWS_SQS_ENDPOINT: http://host.containers.internal:4566
      AWS_SQS_QUEUES_SOLICITUDES_CAPACIDAD: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/solicitudes-capacidad-queue
      AWS_SQS_QUEUES_RESULTADOS_EVALUACION: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/resultados-evaluacion-queue
      AWS_SQS_QUEUES_MANUAL_DECISION: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/notificaciones-manuales-queue
      AWS_SQS_QUEUES_LOAN_APPROVED_EVENTS: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/loan-approved-events-queue
      
      # Email Configuration
      SPRING_MAIL_HOST: host.containers.internal
      SPRING_MAIL_PORT: 1025
      SPRING_MAIL_USERNAME: 
      SPRING_MAIL_PASSWORD: 
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: false
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: false
      
    ports:
      - "8081:8081"
    depends_on:
      postgres-solicitudes:
        condition: service_healthy
    networks:
      - crediya-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

networks:
  crediya-network:
    driver: bridge
    name: crediya-network

volumes:
  postgres_solicitudes_data:
    driver: local
