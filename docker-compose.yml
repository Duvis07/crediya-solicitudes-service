version: '3.8'

services:
  # PostgreSQL Database for Solicitudes
  postgres-solicitudes:
    image: postgres:15-alpine
    container_name: crediya-postgres-solicitudes
    environment:
      POSTGRES_DB: crediya_solicitudes_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nueva_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5434:5432"
    volumes:
      - postgres_solicitudes_data:/var/lib/postgresql/data
    networks:
      - crediya-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crediya_solicitudes_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Solicitudes Service
  solicitudes-service:
    build:
      context: ./deployment
      dockerfile: Dockerfile
    container_name: crediya-solicitudes-service
    environment:
      # Database Configuration
      DB_HOST: postgres-solicitudes
      DB_PORT: 5432
      DB_NAME: crediya_solicitudes_db
      DB_USER: postgres
      DB_PASSWORD: nueva_password
      
      # R2DBC Configuration
      R2DBC_HOST: postgres-solicitudes
      R2DBC_PORT: 5432
      R2DBC_DATABASE: crediya_solicitudes_db
      R2DBC_SCHEMA: public
      R2DBC_USERNAME: postgres
      R2DBC_PASSWORD: nueva_password
      
      # Server Configuration
      SERVER_PORT: 8081
      
      # Authentication Service Configuration
      AUTH_SERVICE_BASE_URL: http://authentication-service:8080
      AUTH_SERVICE_ENDPOINTS_API_BASE: /api/v1/usuarios
      AUTH_SERVICE_ENDPOINTS_USER_BY_DOCUMENT: /{documentId}

      # JWT Configuration
      JWT_SECRET: mySecretKeyForCrediyaAuthenticationServiceThatIsLongEnoughForHS256
      JWT_JWK_SET_URI: http://localhost:8080/.well-known/jwks.json
      JWT_ISSUER_URI: http://localhost:8080
      
      # CORS Configuration
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
      
      # Logging
      LOGGING_LEVEL_ROOT: WARN
      LOGGING_LEVEL_CO_COM_CREDIYA: INFO
      
      # Spring Profiles
      SPRING_PROFILES_ACTIVE: local
      
    ports:
      - "8081:8081"
    depends_on:
      postgres-solicitudes:
        condition: service_healthy
    networks:
      - crediya-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

networks:
  crediya-network:
    driver: bridge
    name: crediya-network

volumes:
  postgres_solicitudes_data:
    driver: local
